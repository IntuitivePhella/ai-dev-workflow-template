name: AI Workflow Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  workflow-guardrails:
    name: Workflow guardrails
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show workflow CLI help
        run: node scripts/aiwf.js help

      - name: Run workflow doctor
        run: node scripts/aiwf.js doctor

      - name: Check gates
        run: node scripts/aiwf.js gates

      - name: Check sensitive paths
        run: node scripts/aiwf.js sensitive HEAD~1 HEAD

      - name: Validate active stories when present
        shell: bash
        run: |
          shopt -s nullglob
          stories=(ai/04-stories/*.md)
          if [ ${#stories[@]} -eq 0 ]; then
            echo "No active stories found. Skipping story validation."
            exit 0
          fi

          for story in "${stories[@]}"; do
            echo "Validating $story"
            node scripts/aiwf.js validate "$story"
          done

      - name: Smoke test install existing + story + validate
        shell: bash
        run: |
          rm -rf tmp-aiwf-test
          node scripts/aiwf.js install existing tmp-aiwf-test
          test -f tmp-aiwf-test/AGENTS.md
          test -f tmp-aiwf-test/CLAUDE.md
          test -d tmp-aiwf-test/ai
          test -d tmp-aiwf-test/scripts
          test -d tmp-aiwf-test/prompts
          test -d tmp-aiwf-test/docs
          test -d tmp-aiwf-test/.claude
          test -d tmp-aiwf-test/.codex
          test -f tmp-aiwf-test/.github/pull_request_template.md
          pushd tmp-aiwf-test >/dev/null
          node scripts/aiwf.js story feature "Workflow smoke test"
          story_file="$(ls ai/04-stories/*workflow-smoke-test.md | head -n 1)"
          node scripts/aiwf.js validate "$story_file"
          popd >/dev/null

      - name: Smoke test install new
        shell: bash
        run: |
          rm -rf tmp-aiwf-new-project
          node scripts/aiwf.js install new tmp-aiwf-new-project
          test -f tmp-aiwf-new-project/ai/01-discovery/PROJECT_BRIEF.md
          test -f tmp-aiwf-new-project/ai/02-product/PRD.md
          test -f tmp-aiwf-new-project/ai/03-architecture/ARCHITECTURE.md
