name: AI Workflow Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  workflow-guardrails:
    name: Workflow guardrails
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show workflow CLI help
        run: node scripts/aiwf.js help

      - name: Run workflow doctor
        run: node scripts/aiwf.js doctor

      - name: Check gates
        run: node scripts/aiwf.js gates

      - name: Check sensitive paths
        run: node scripts/aiwf.js sensitive HEAD~1 HEAD

      - name: Validate active stories when present
        run: |
          node -e "const fs=require('fs');const path=require('path');const {execFileSync}=require('child_process');const dir='ai/04-stories';if(!fs.existsSync(dir)){console.log('No story directory found. Skipping story validation.');process.exit(0);}const stories=fs.readdirSync(dir).filter(f=>f.endsWith('.md')).map(f=>path.join(dir,f));if(stories.length===0){console.log('No active stories found. Skipping story validation.');process.exit(0);}for(const story of stories){console.log('Validating '+story);execFileSync('node',['scripts/aiwf.js','validate',story],{stdio:'inherit'});}"

      - name: Smoke test install existing + story + validate
        run: |
          node -e "const fs=require('fs');const path=require('path');const {execFileSync}=require('child_process');const tmp='tmp-aiwf-test';fs.rmSync(tmp,{recursive:true,force:true});execFileSync('node',['scripts/aiwf.js','install','existing',tmp],{stdio:'inherit'});const required=[['AGENTS.md','file'],['CLAUDE.md','file'],['ai','dir'],['scripts','dir'],['prompts','dir'],['docs','dir'],['.claude','dir'],['.codex','dir'],['.github/pull_request_template.md','file']];for(const [rel,type] of required){const p=path.join(tmp,rel);if(!fs.existsSync(p)) throw new Error('Missing required asset: '+rel);const stat=fs.statSync(p);if(type==='file'&&!stat.isFile()) throw new Error('Expected file: '+rel);if(type==='dir'&&!stat.isDirectory()) throw new Error('Expected dir: '+rel);}execFileSync('node',['scripts/aiwf.js','story','feature','Workflow smoke test'],{cwd:tmp,stdio:'inherit'});const stories=fs.readdirSync(path.join(tmp,'ai/04-stories')).filter(f=>f.endsWith('.md')&&f.includes('workflow-smoke-test'));if(stories.length===0) throw new Error('Smoke story was not generated');const storyPath=path.join('ai/04-stories',stories[0]);execFileSync('node',['scripts/aiwf.js','validate',storyPath],{cwd:tmp,stdio:'inherit'});"

      - name: Smoke test install new
        run: |
          node -e "const fs=require('fs');const path=require('path');const {execFileSync}=require('child_process');const tmp='tmp-aiwf-new-project';fs.rmSync(tmp,{recursive:true,force:true});execFileSync('node',['scripts/aiwf.js','install','new',tmp],{stdio:'inherit'});const required=['ai/01-discovery/PROJECT_BRIEF.md','ai/02-product/PRD.md','ai/03-architecture/ARCHITECTURE.md'];for(const rel of required){const p=path.join(tmp,rel);if(!fs.existsSync(p)) throw new Error('Missing required scaffold: '+rel);if(!fs.statSync(p).isFile()) throw new Error('Expected file scaffold: '+rel);}"
