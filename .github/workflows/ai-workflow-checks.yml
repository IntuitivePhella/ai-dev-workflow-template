name: AI Workflow Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  workflow-guardrails:
    name: Workflow guardrails (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show workflow CLI help
        run: node scripts/aiwf.js help

      - name: Run workflow doctor
        run: node scripts/aiwf.js doctor

      - name: Check gates
        run: node scripts/aiwf.js gates

      - name: Check sensitive paths
        run: node scripts/aiwf.js sensitive HEAD~1 HEAD

      - name: Validate active stories when present
        shell: pwsh
        run: |
          $stories = Get-ChildItem -Path "ai/04-stories" -Filter "*.md" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne "README.md" -and $_.Name -notlike "*.template.md" -and -not $_.Name.StartsWith(".") }

          if (-not $stories) {
            Write-Host "No executable stories found. Skipping story validation."
            exit 0
          }

          foreach ($story in $stories) {
            Write-Host "Validating $($story.FullName)"
            node scripts/aiwf.js validate $story.FullName
          }

      - name: Smoke test install existing
        shell: pwsh
        run: |
          function Assert-PathExists($Path) {
            if (-not (Test-Path $Path)) {
              throw "Expected path does not exist: $Path"
            }
          }

          $target = "tmp-aiwf-existing-smoke"
          if (Test-Path $target) { Remove-Item -Recurse -Force $target }
          New-Item -ItemType Directory -Path $target | Out-Null
          node scripts/aiwf.js install existing $target
          Assert-PathExists "$target/AGENTS.md"
          Assert-PathExists "$target/CLAUDE.md"
          Assert-PathExists "$target/ai"
          Assert-PathExists "$target/scripts"
          Assert-PathExists "$target/prompts"
          Assert-PathExists "$target/docs"
          Assert-PathExists "$target/.claude"
          Assert-PathExists "$target/.codex"
          Assert-PathExists "$target/.github/pull_request_template.md"
          Push-Location $target
          node scripts/aiwf.js story feature "Test installable workflow"
          $story = Get-ChildItem -Path "ai/04-stories" -Filter "*test-installable-workflow.md" | Select-Object -First 1
          if (-not $story) { throw "Story was not created" }
          node scripts/aiwf.js validate $story.FullName
          Pop-Location
          Remove-Item -Recurse -Force $target

      - name: Smoke test install new
        shell: pwsh
        run: |
          function Assert-PathExists($Path) {
            if (-not (Test-Path $Path)) {
              throw "Expected path does not exist: $Path"
            }
          }

          $target = "tmp-aiwf-new-smoke"
          if (Test-Path $target) { Remove-Item -Recurse -Force $target }
          New-Item -ItemType Directory -Path $target | Out-Null
          node scripts/aiwf.js install new $target
          Assert-PathExists "$target/ai/01-discovery/PROJECT_BRIEF.md"
          Assert-PathExists "$target/ai/02-product/PRD.md"
          Assert-PathExists "$target/ai/03-architecture/ARCHITECTURE.md"
          Remove-Item -Recurse -Force $target
